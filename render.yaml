services:
  - type: web
    name: synopsis-ai-backend
    runtime: python
    repo: https://github.com/iamnithino/yousynopsis
    rootDir: backend/
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
      - key: TRANSCRIPT_SERVICE_HOST
        fromService:
          type: pserv
          name: synopsis-ai-transcript-service
          property: host
      - key: TRANSCRIPT_SERVICE_PORT
        value: 3001
      - key: TRANSCRIPT_SERVICE_TIMEOUT
        value: 30

  - type: pserv
    name: synopsis-ai-transcript-service
    runtime: node
    repo: https://github.com/iamnithino/yousynopsis
    rootDir: transcript-service/
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: PORT
        value: 3001
      - key: CAPTION_GROUP_SECONDS
        value: 45
