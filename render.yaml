services:
  - type: web
    name: yousynopsis-backend
    runtime: python
    repo: https://github.com/iamnithino/yousynopsis
    rootDir: backend/
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PORT
        value: 10000
