services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      TRANSCRIPT_SERVICE_URL: http://transcript-service:3001
      CORS_ORIGINS: http://localhost:5173
    env_file:
      - ./backend/.env
    depends_on:
      - transcript-service

  transcript-service:
    build:
      context: ./transcript-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      CAPTION_GROUP_SECONDS: 45
